# Để null nếu đã copy `gfmrag/` vào root project.
# Có thể override bằng --gfmrag-path khi cần.
gfmrag_path: null
disable_custom_rspmm: true

graph:
  name: multifin_graph
  graph_dir: data/graph
  tensor_dir: data/graph_tensor
  build_relation_graph: false
  mention_relation_key: is_mentioned_in

  # QueryGNN cần graph.rel_attr. Graph tensor hiện tại chưa có, nên ta build từ rel2id.json.
  relation_embedding_model: BAAI/bge-base-en-v1.5
  relation_embedding_device: null
  relation_embedding_batch_size: 32
  force_rebuild_rel_attr: false

model:
  # entity_model chính là QueryNBFNet của tác giả
  entity_model:
    _target_: gfmrag.models.ultra.models.QueryNBFNet
    # Khi finetune từ pretrained của tác giả, kiến trúc phải khớp tuyệt đối.
    input_dim: 512
    hidden_dims: [512, 512, 512, 512, 512, 512]
    message_func: distmult
    aggregate_func: sum
    short_cut: true
    layer_norm: true

training:
  output_dir: outputs/graph_retriever/kgc_gfm_pretrained
  pretrained_model_path: model/model.pth
  # Cấu hình ưu tiên GPU T4
  device: cuda
  lr: 5.0e-4
  epochs: 10
  train_batch_size: 8
  eval_batch_size: 8
  logging_steps: 50
  dtype: float16

  num_negative: 256
  strict_negative: true
  adversarial_temperature: 1.0
  fast_test: 500
  metrics: [mr, mrr, hits@1, hits@3, hits@10]
  save_best_only: true
  metric_for_best_model: mrr
  eval_strategy: epoch

