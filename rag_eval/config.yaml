financebench:
  questions_path: benchmark/financebench/data/financebench_open_source.jsonl
  pdf_dir: benchmark/financebench/pdfs

chunking:
  # Set this to your own chunk file to plug in an existing chunking pipeline.
  # If null/empty, the adapter creates simple page-level chunks from FinanceBench PDFs.
  source_chunks_path:
  output_chunks_path: outputs/financebench_eval/chunks.jsonl
  chunk_types: ["text", "table"]

index:
  output_dir: outputs/financebench_eval/index
  model_name: BAAI/bge-base-en-v1.5
  batch_size: 32
  device:

mapping:
  qrels_path: outputs/financebench_eval/qrels.jsonl
  unmatched_path: outputs/financebench_eval/unmatched_evidence.jsonl
  fuzzy_token_threshold: 0.60
  fuzzy_sequence_threshold: 0.18
  max_fuzzy_matches: 5
  use_page_fallback: true

retrieval:
  top_k: 10
  k_values: [1, 3, 5, 10]
  results_path: outputs/financebench_eval/retrieval_results.jsonl

metrics:
  summary_path: outputs/financebench_eval/metrics_summary.json
  by_question_path: outputs/financebench_eval/metrics_by_question.jsonl

report:
  path: outputs/financebench_eval/retrieval_eval_report.md
